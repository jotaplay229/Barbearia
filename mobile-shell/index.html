<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>BarberOS Painel</title>
  <style>
    *{box-sizing:border-box}
    body{min-height:100vh;margin:0;display:grid;place-items:center;background:#050505;color:#fff;font-family:Arial,sans-serif}
    main{width:min(360px,calc(100% - 32px));text-align:center;border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:26px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03))}
    .mark{width:68px;height:68px;margin:0 auto 16px;border-radius:22px;background:#fff;color:#000;display:grid;place-items:center;font-size:34px;font-weight:900}
    p{color:#bbb;line-height:1.5}
    a{display:block;margin-top:18px;padding:14px 16px;border-radius:16px;background:#fff;color:#000;text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <main>
    <div class="mark">B</div>
    <h1>BarberOS Painel</h1>
    <p>Conectando ao painel da barbearia.</p>
    <a href="https://barbearia-virtual.vercel.app/painel">Abrir painel</a>
  </main>
  <script>
    location.replace('https://barbearia-virtual.vercel.app/painel');
  </script>
</body>
</html>
