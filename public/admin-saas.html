<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BarberOS Master</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050505;--panel:#121212;--panel2:#181818;--line:#2b2b2b;--line2:#3a3a3a;--text:#f7f7f7;--muted:#9b9b9b;--dim:#666;--accent:#f5f5f5;--accent2:#2d2d2d;--ok:#f2f2f2;--warn:#cfcfcf;--blue:#adadad;--shadow:0 24px 80px rgba(0,0,0,.45)}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif;font-size:14px}
body:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:56px 56px,56px 56px,224px 224px,224px 224px;mask-image:linear-gradient(to bottom,#000,rgba(0,0,0,.96) 70%,rgba(0,0,0,.74));pointer-events:none}
button,input,select{font:inherit}
.login{min-height:100vh;display:grid;place-items:center;padding:24px;position:relative}
.loginCard{width:min(390px,100%);border:1px solid var(--line);background:linear-gradient(180deg,#181818,#0d0d0d);border-radius:8px;padding:28px;box-shadow:var(--shadow)}
.loginLogo{width:66px;height:66px;border-radius:8px;background:#fff;color:#000;display:grid;place-items:center;font-size:28px;font-weight:1000;margin:0 auto 22px}
.field{display:grid;gap:7px;margin-bottom:12px}.field label{color:#b8b8b8;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.inp,select{width:100%;background:#1b1b1b;border:1px solid #3a3a3a;border-radius:8px;color:#fff;padding:13px 14px;outline:0}.inp:focus,select:focus{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.08)}.inp[readonly]{background:#151515;color:#cfcfcf}.passWrap{position:relative}.passWrap .inp{padding-right:54px}.eyeBtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:1px solid #3a3a3a;border-radius:8px;background:#242424;color:#fff;cursor:pointer;font-weight:900}
.btn{border:1px solid var(--line2);background:#202020;color:#fff;border-radius:8px;padding:11px 14px;cursor:pointer;font-weight:850;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.16s;text-decoration:none}.btn:hover{transform:translateY(-1px);border-color:#666;background:#292929}.btn.primary{background:#f5f5f5;border-color:#fff;color:#050505;box-shadow:0 14px 36px rgba(255,255,255,.10)}.btn.danger{background:#262626;border-color:#555;color:#fff}.btn.ghost{background:#151515}.btn.full{width:100%;margin-top:8px}.btn.small{padding:8px 10px;font-size:12px}
.err{display:none;margin-top:12px;padding:10px 12px;border:1px solid #5a5a5a;background:#151515;color:#f1f1f1;border-radius:8px}.err.show{display:block}
.app{display:none;min-height:100vh;position:relative}.app.show{display:grid;grid-template-columns:240px minmax(0,1fr)}
.side{height:100vh;position:sticky;top:0;border-right:1px solid var(--line);background:#111;padding:18px 10px;z-index:5}
.brand{display:flex;align-items:center;gap:12px;padding:8px 8px 22px}.brandMark{width:38px;height:38px;border-radius:8px;background:#f5f5f5;color:#050505;display:grid;place-items:center;font-weight:1000}.brand b{display:block;letter-spacing:.02em}.brand small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.groupLabel{color:#777;font-size:10px;text-transform:uppercase;letter-spacing:.12em;margin:16px 8px 8px}
.nav{display:grid;gap:5px}.nav button{border:0;background:transparent;color:#aaa;border-radius:8px;padding:11px 10px;text-align:left;cursor:pointer;font-weight:750;display:flex;justify-content:space-between;align-items:center}.nav button:hover,.nav button.active{background:#262626;color:#fff}.nav button.active{box-shadow:inset 3px 0 0 #fff}.badge{min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:#f5f5f5;color:#050505;display:inline-grid;place-items:center;font-size:11px}
.account{position:absolute;left:10px;right:10px;bottom:14px;border:1px solid var(--line);border-radius:8px;padding:12px;background:#151515;color:var(--muted);font-size:12px;overflow:hidden}.account b{display:block;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.main{min-width:0}.top{height:78px;border-bottom:1px solid var(--line);background:rgba(10,10,10,.88);backdrop-filter:blur(18px);position:sticky;top:0;z-index:4;display:flex;align-items:center;gap:12px;padding:0 28px}.top h1{font-size:23px;letter-spacing:-.03em;flex:1}.topActions{display:flex;gap:8px}
.content{padding:28px;max-width:1280px}.crumb{color:#777;font-size:12px;margin-bottom:8px}.crumb b{color:#fff}.pageHead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px}.pageHead h2{font-size:26px;letter-spacing:-.04em}.pageHead p{color:var(--muted);margin-top:5px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.stat{border:1px solid var(--line);background:linear-gradient(135deg,#151515,#101010);border-radius:8px;padding:18px;min-height:108px;position:relative;overflow:hidden}.stat:after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.07),transparent 70%);opacity:.75;pointer-events:none}.stat.ok:after,.stat.blue:after,.stat.warn:after{background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.07),transparent 70%)}.k{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8c8c8c}.v{font-size:31px;font-weight:1000;margin-top:8px;letter-spacing:-.04em}.delta{color:#898989;font-size:12px;margin-top:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.panel{border:1px solid var(--line);background:rgba(18,18,18,.86);border-radius:8px;padding:18px}.panelHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.panelHead h3{font-size:16px}.panelHead span{color:var(--muted);font-size:12px}
.table{width:100%;border-collapse:collapse}.table th{color:#838383;font-size:10px;text-transform:uppercase;letter-spacing:.08em;text-align:left;border-bottom:1px solid var(--line);padding:10px}.table td{border-bottom:1px solid #202020;padding:12px 10px;color:#eee;vertical-align:middle}.table tr:hover td{background:rgba(255,255,255,.025)}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:900;background:#242424;color:#ddd}.pill:before{content:"";width:7px;height:7px;border-radius:50%;background:#777}.pill.ok{background:#303030;color:#f2f2f2}.pill.ok:before{background:#f2f2f2}.pill.warn{background:#252525;color:#d8d8d8}.pill.warn:before{background:#bdbdbd}.pill.err{background:#1b1b1b;color:#bdbdbd;border:1px solid #363636}.pill.err:before{background:#8a8a8a}
.storeCard{border:1px solid var(--line);background:#121212;border-radius:8px;padding:16px;display:grid;gap:13px}.storeTop{display:flex;justify-content:space-between;gap:12px}.storeIcon{width:42px;height:42px;border:1px solid #393939;border-radius:8px;background:#1e1e1e;display:grid;place-items:center;font-weight:1000}.storeName{display:flex;gap:10px;min-width:0}.storeName b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.storeName small{display:block;color:#8d8d8d;margin-top:3px}.meta{display:grid;gap:6px;color:#a0a0a0;font-size:12px}.actions{display:flex;gap:7px;flex-wrap:wrap}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.formgrid.one{grid-template-columns:1fr}.previewBox{border:1px solid var(--line);background:#1a1a1a;border-radius:8px;padding:12px;color:#cfcfcf;font-size:12px;line-height:1.7}
.search{margin-bottom:16px}.search input{padding-left:38px}.searchWrap{position:relative}.searchWrap:before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#777}
.empty{padding:24px;border:1px dashed #333;border-radius:8px;color:#999;text-align:center}.toast{position:fixed;right:22px;bottom:22px;z-index:20;background:#f5f5f5;color:#050505;border:1px solid #fff;border-radius:8px;padding:13px 15px;opacity:0;transform:translateY(12px);transition:.2s}.toast.show{opacity:1;transform:none}
.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.modalBox{width:min(620px,100%);max-height:88vh;overflow:auto;border:1px solid var(--line2);background:#121212;border-radius:8px;box-shadow:var(--shadow)}.modalHead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}.modalHead h3{font-size:17px}.modalBody{padding:18px}.modalFoot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--line)}
@media(max-width:980px){.app.show{display:block}.side{height:auto;position:relative}.account{position:static;margin-top:12px}.nav{grid-template-columns:repeat(2,1fr)}.top{padding:0 16px}.content{padding:18px}.stats,.grid2,.grid3,.formgrid{grid-template-columns:1fr}.table{font-size:12px}.hideMobile{display:none}}
</style>
</head>
<body>
<div class="login" id="loginView">
  <section class="loginCard">
    <div class="loginLogo">B</div>
    <div class="field"><label>Usuário</label><input id="email" class="inp" type="email" autocomplete="email"></div>
    <div class="field"><label>Senha</label><div class="passWrap"><input id="pass" class="inp" type="password" autocomplete="current-password"><button class="eyeBtn" type="button" onclick="togglePassword('pass',this)">👁</button></div></div>
    <button class="btn primary full" id="loginBtn" onclick="loginFn()">Entrar</button>
    <div class="err" id="err"></div>
  </section>
</div>

<div class="app" id="appView">
  <aside class="side">
    <div class="brand"><div class="brandMark">B</div><div><b>BarberOS</b><small>MASTER PANEL</small></div></div>
    <div class="groupLabel">Visão geral</div>
    <nav class="nav">
      <button class="active" data-page="dash" onclick="page('dash')">Dashboard</button>
      <button data-page="lojas" onclick="page('lojas')">Barbearias <span class="badge" id="navTotal">0</span></button>
      <button data-page="monitor" onclick="page('monitor')">Monitor</button>
    </nav>
    <div class="groupLabel">Gestão</div>
    <nav class="nav">
      <button data-page="nova" onclick="page('nova')">Criar loja</button>
      <button data-page="donos" onclick="page('donos')">Donos</button>
    </nav>
    <div class="groupLabel">Sistema</div>
    <nav class="nav">
      <button data-page="config" onclick="page('config')">Configurações</button>
      <button data-page="logs" onclick="page('logs')">Logs</button>
    </nav>
    <div class="account"><b id="accountEmail">admin</b><button class="btn ghost full" onclick="logout()">Sair</button></div>
  </aside>
  <main class="main">
    <header class="top"><h1 id="title">Dashboard</h1><div class="topActions"><button class="btn" onclick="load()">Atualizar</button><button class="btn danger" onclick="logout()">Sair</button></div></header>
    <section class="content" id="content"></section>
  </main>
</div>

<div class="modal" id="modal"><div class="modalBox"><div class="modalHead"><h3 id="modalTitle"></h3><button class="btn small ghost" onclick="closeModal()">Fechar</button></div><div class="modalBody" id="modalBody"></div><div class="modalFoot" id="modalFoot"></div></div></div>
<div class="toast" id="toast">Salvo</div>

<script>
let token='', userEmail='', dash=null, current='dash', query='';
const pageTitles={dash:'Dashboard',lojas:'Barbearias',monitor:'Monitor em tempo real',nova:'Criar loja',donos:'Donos de loja',config:'Configurações master',logs:'Logs do sistema'};

function apiUrl(route,params={}){const u=new URL('/api/router',location.origin);u.searchParams.set('route',route);Object.entries(params).forEach(([k,v])=>{if(v!==undefined&&v!==null&&v!=='')u.searchParams.set(k,v)});return u.pathname+u.search}
async function getJson(url,opt={}){const r=await fetch(url,opt);const txt=await r.text();let j={};try{j=txt?JSON.parse(txt):{}}catch(e){throw new Error('A API retornou erro da Vercel. Confirme o deploy.')}if(!r.ok)throw new Error(j.erro||j.error||('Erro HTTP '+r.status));return j}
function readStore(k){try{return localStorage.getItem(k)||''}catch(e){return ''}}
function saveStore(k,v){try{v?localStorage.setItem(k,v):localStorage.removeItem(k)}catch(e){}}
function request(route,opt={},params={}){const headers={'Content-Type':'application/json',...(opt.headers||{})};if(token)headers.Authorization='Bearer '+token;return getJson(apiUrl(route,params),{...opt,headers})}
function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function onlyDigits(v){return String(v||'').replace(/\D/g,'')}
function localPhoneDigits(v){let d=onlyDigits(v);if(d.startsWith('55')&&d.length>11)d=d.slice(2);return d.slice(0,11)}
function formatPhoneBR(v){const d=localPhoneDigits(v);if(d.length<=2)return d;if(d.length<=6)return `(${d.slice(0,2)}) ${d.slice(2)}`;if(d.length<=10)return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`}
function brDate(v){if(!v)return '-';const d=new Date(v);if(Number.isNaN(d.getTime()))return String(v).slice(0,10).split('-').reverse().join('/');return d.toLocaleDateString('pt-BR')}
function statusPill(status){const cls=status==='ativa'?'ok':status==='trial'?'warn':'err';return `<span class="pill ${cls}">${esc(status||'-')}</span>`}
function openPill(ok,yes='Online',no='Offline'){return `<span class="pill ${ok?'ok':'err'}">${ok?yes:no}</span>`}
function publicLink(slug){return `${location.origin}/agendar?slug=${encodeURIComponent(String(slug||''))}`}
function slugify(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function showErr(msg){err.textContent=msg||'';err.classList.toggle('show',!!msg)}
function togglePassword(id,btn){const el=document.getElementById(id);if(!el)return;const show=el.type==='password';el.type=show?'text':'password';btn.textContent=show?'✕':'👁'}
function toast(msg='Salvo com sucesso'){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

async function init(){token=readStore('barberos_saas_token');userEmail=readStore('barberos_saas_email');if(token){accountEmail.textContent=userEmail||'admin';try{await load()}catch(e){saveStore('barberos_saas_token','');showErr('Sessão expirada. Entre novamente.')}}}
async function loginFn(){showErr('');try{loginBtn.textContent='Entrando...';const data=await request('auth-login',{method:'POST',body:JSON.stringify({email:email.value.trim(),password:pass.value,area:'saas'})});token=data.access_token;userEmail=data.user?.email||email.value.trim();saveStore('barberos_saas_token',token);saveStore('barberos_saas_email',userEmail);accountEmail.textContent=userEmail;await load()}catch(e){showErr(e.message)}finally{loginBtn.textContent='Entrar'}}
function logout(){saveStore('barberos_saas_token','');saveStore('barberos_saas_email','');location.reload()}
async function load(){dash=await request('saas-dashboard');navTotal.textContent=dash.total_barbearias||0;openApp();render()}
function openApp(){loginView.style.display='none';appView.classList.add('show')}
function page(p){current=p;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));title.textContent=pageTitles[p]||p;render()}
function pageHeader(name,sub,action=''){return `<div class="crumb">BarberOS <b>›</b> ${esc(name)}</div><div class="pageHead"><div><h2>${esc(name)}</h2><p>${esc(sub||'')}</p></div>${action}</div>`}
function filteredStores(){const q=query.trim().toLowerCase();const arr=dash?.barbearias||[];if(!q)return arr;return arr.filter(b=>[b.nome,b.slug,b.owner?.nome,b.owner?.email].some(v=>String(v||'').toLowerCase().includes(q)))}
function render(){if(!dash)return;if(current==='dash')renderDash();else if(current==='lojas')renderLojas();else if(current==='monitor')renderMonitor();else if(current==='nova')renderNova();else if(current==='donos')renderDonos();else if(current==='config')renderConfig();else if(current==='logs')renderLogs()}

function renderDash(){
  const lojas=dash.barbearias||[];
  content.innerHTML=`${pageHeader('Dashboard','Visão geral do sistema em tempo real')}
  <div class="stats">
    <div class="stat"><div class="k">Total de lojas</div><div class="v">${dash.total_barbearias||0}</div><div class="delta">cadastradas</div></div>
    <div class="stat ok"><div class="k">Lojas online</div><div class="v">${dash.online||0}</div><div class="delta">ativas no SaaS</div></div>
    <div class="stat blue"><div class="k">Abertas agora</div><div class="v">${dash.abertas_agora||0}</div><div class="delta">dentro do horário</div></div>
    <div class="stat warn"><div class="k">Agendamentos hoje</div><div class="v">${dash.agendamentos_hoje||0}</div><div class="delta">${dash.pendentes_hoje||0} pendentes</div></div>
  </div>
  <div class="grid2">
    <section class="panel"><div class="panelHead"><h3>Status das lojas</h3><span>${lojas.length} lojas</span></div>${statusList(lojas)}</section>
    <section class="panel"><div class="panelHead"><h3>Atividade recente</h3><span>agenda e WhatsApp</span></div>${logsList(dash.logs||[])}</section>
  </div>`;
}

function statusList(arr){return `<table class="table"><tbody>${arr.map(b=>`<tr><td><b>${esc(b.nome)}</b><br><small style="color:#777">${esc(b.slug)}</small></td><td>${openPill(b.online)}</td><td>${openPill(b.aberta,'Aberta','Fechada')}</td><td class="hideMobile">${b.whatsapp_conectado?openPill(true,'WhatsApp'):b.whatsapp_configurado?openPill(false,'QR pendente','QR pendente'):'-'}</td></tr>`).join('')||'<tr><td><div class="empty">Nenhuma loja cadastrada.</div></td></tr>'}</tbody></table>`}

function renderLojas(){
  const arr=filteredStores();
  content.innerHTML=`${pageHeader('Lojas cadastradas','Gerencie todas as barbearias',`<button class="btn primary" onclick="page('nova')">+ Nova loja</button>`)}
  <div class="search"><div class="searchWrap"><input class="inp" value="${esc(query)}" oninput="query=this.value;renderLojas()" placeholder="Buscar loja, slug ou dono"></div></div>
  <div class="grid3">${arr.map(storeCard).join('')||'<div class="empty">Nenhuma loja encontrada.</div>'}</div>`;
}

function storeCard(b){return `<article class="storeCard"><div class="storeTop"><div class="storeName"><div class="storeIcon">B</div><div><b>${esc(b.nome)}</b><small>${esc(b.slug)}</small></div></div>${statusPill(b.status)}</div><div class="meta"><span>Dono: ${esc(b.owner?.nome||'-')}</span><span>E-mail: ${esc(b.owner?.email||'-')}</span><span>Hoje: ${b.agendamentos_hoje||0} agendamentos</span><span>${b.aberta?'Aberta agora':'Fechada agora'} · ${b.whatsapp_conectado?'WhatsApp conectado':b.whatsapp_configurado?'WhatsApp pendente':'Sem WhatsApp'}</span></div><div class="actions"><a class="btn small" href="${publicLink(b.slug)}" target="_blank" rel="noopener">Loja</a><button class="btn small" onclick="openStoreModal('${esc(b.id)}')">Editar</button><button class="btn small" onclick="openOwnerModal('${esc(b.owner_user_id)}')">Dono</button><button class="btn small danger" onclick="setStatus('${esc(b.id)}','${b.status==='ativa'?'suspensa':'ativa'}')">${b.status==='ativa'?'Desativar':'Ativar'}</button><button class="btn small danger" onclick="openDeleteStoreModal('${esc(b.id)}')">Excluir</button></div></article>`}

function renderMonitor(){
  const arr=filteredStores();
  content.innerHTML=`${pageHeader('Monitor em tempo real','Status de cada barbearia e links ativos',`<button class="btn" onclick="load()">Atualizar</button>`)}
  <div class="panel"><table class="table"><thead><tr><th>Loja</th><th>Slug</th><th>Status</th><th>Aberta</th><th>WhatsApp</th><th>Hoje</th><th>Links</th><th>Ações</th></tr></thead><tbody>${arr.map(b=>`<tr><td><b>${esc(b.nome)}</b><br><small style="color:#777">${esc(b.owner?.email||'-')}</small></td><td>${esc(b.slug)}</td><td>${openPill(b.online)}</td><td>${openPill(b.aberta,'Aberta','Fechada')}</td><td>${b.whatsapp_conectado?openPill(true,'Conectado'):b.whatsapp_configurado?openPill(false,'Pendente','Pendente'):'-'}</td><td>${b.agendamentos_hoje||0}</td><td><button class="btn small" onclick="copyText('${publicLink(esc(b.slug))}')">Copiar</button></td><td><button class="btn small" onclick="openStoreModal('${esc(b.id)}')">Editar</button></td></tr>`).join('')||'<tr><td colspan="8"><div class="empty">Nenhuma loja cadastrada.</div></td></tr>'}</tbody></table></div>`;
}

function renderNova(){
  content.innerHTML=`${pageHeader('Nova loja','Cadastre uma barbearia e a conta do dono')}
  <div class="grid2"><section class="panel"><div class="panelHead"><h3>Dados da loja</h3><span>conta + barbearia</span></div><div class="formgrid"><div class="field"><label>Nome da loja</label><input class="inp" id="newNome" oninput="suggestSlug()" placeholder="Barbearia Bella"></div><div class="field"><label>Slug automatico</label><input class="inp" id="newSlug" readonly placeholder="barbearia-bella"></div><div class="field"><label>Nome do dono</label><input class="inp" id="newOwnerNome" placeholder="João Silva"></div><div class="field"><label>WhatsApp</label><input class="inp" id="newZap" inputmode="numeric" oninput="this.value=formatPhoneBR(this.value)" placeholder="(84) 99999-9999"></div><div class="field"><label>E-mail do dono</label><input class="inp" id="newEmail" type="email" placeholder="dono@email.com"></div><div class="field"><label>Senha inicial</label><div class="passWrap"><input class="inp" id="newPass" type="password" placeholder="mínimo 6 caracteres"><button class="eyeBtn" type="button" onclick="togglePassword('newPass',this)">👁</button></div></div><div class="field"><label>Status</label><select id="newStatus"><option value="ativa">ativa</option><option value="suspensa">suspensa</option></select></div></div><div class="previewBox" id="newPreview">Agenda: ${publicLink('slug')}</div><button class="btn primary full" onclick="createBarb()">Criar loja</button><div class="err" id="newErr"></div></section><section class="panel"><div class="panelHead"><h3>Depois do cadastro</h3></div><div class="previewBox">O dono entra pelo painel da barbearia usando o e-mail e a senha criados aqui. A loja já nasce com horários, serviços e um profissional inicial.</div></section></div>`;
}

function suggestSlug(){newSlug.value=slugify(newNome.value);newPreview.textContent='Agenda: '+publicLink(newSlug.value||'slug')}
async function createBarb(){newErr.classList.remove('show');try{const payload={nome:newNome.value,slug:newSlug.value||slugify(newNome.value),owner_nome:newOwnerNome.value,owner_email:newEmail.value,owner_password:newPass.value,whatsapp_dono:localPhoneDigits(newZap.value),status:newStatus.value};await request('saas-barbearias',{method:'POST',body:JSON.stringify(payload)});toast('Loja criada');await load();page('lojas')}catch(e){newErr.textContent=e.message;newErr.classList.add('show')}}

function renderDonos(){
  const arr=dash.donos||[];
  content.innerHTML=`${pageHeader('Donos de loja','Usuários vinculados às barbearias')}
  <section class="panel"><table class="table"><thead><tr><th>Nome</th><th>E-mail</th><th>Loja</th><th>Criado em</th><th>Ações</th></tr></thead><tbody>${arr.map(d=>`<tr><td><b>${esc(d.nome||'-')}</b></td><td>${esc(d.email||'-')}</td><td>${esc(d.barbearia_nome)}</td><td>${brDate(d.created_at)}</td><td><button class="btn small" onclick="openOwnerModal('${esc(d.user_id)}')">Alterar e-mail/senha</button></td></tr>`).join('')||'<tr><td colspan="5"><div class="empty">Nenhum dono cadastrado.</div></td></tr>'}</tbody></table></section>`;
}

function renderConfig(){
  content.innerHTML=`${pageHeader('Configurações master','Rotas e ambiente do SaaS')}
  <div class="grid2"><section class="panel"><div class="panelHead"><h3>Links principais</h3></div><div class="previewBox">Master: ${location.origin}/admin-saas<br>Painel da barbearia: ${location.origin}/painel<br>Agenda publica: ${location.origin}/agendar?slug=slug-da-loja<br>Cron: ${location.origin}/api/cron-lembretes?secret=SUA_CHAVE</div></section><section class="panel"><div class="panelHead"><h3>Ambiente</h3></div><div class="previewBox">Deploy atual: ${location.origin}<br>Data do dashboard: ${dash.hoje||'-'}<br>WhatsApp conectados: ${dash.whatsapp_conectados||0}</div></section></div>`;
}

function renderLogs(){
  content.innerHTML=`${pageHeader('Logs do sistema','Atividades recentes em agenda e WhatsApp',`<button class="btn" onclick="load()">Atualizar</button>`)}
  <section class="panel">${logsList(dash.logs||[],true)}</section>`;
}

function logsList(arr,table=false){if(!arr.length)return '<div class="empty">Nenhum log recente.</div>';const rows=arr.map(l=>{const loja=(dash.barbearias||[]).find(b=>b.id===l.barbearia_id);return `<tr><td>${brDate(l.created_at)}</td><td>${esc(loja?.nome||'-')}</td><td>${esc(l.tipo)}</td><td>${esc(l.status||'-')}</td><td>${esc(l.detalhe||'-')}</td></tr>`}).join('');return `<table class="table"><thead><tr><th>Hora</th><th>Loja</th><th>Evento</th><th>Status</th><th>Detalhe</th></tr></thead><tbody>${rows}</tbody></table>`}

function openModal(title,body,foot){modalTitle.textContent=title;modalBody.innerHTML=body;modalFoot.innerHTML=foot;modal.classList.add('show')}
function closeModal(){modal.classList.remove('show');modalBody.innerHTML='';modalFoot.innerHTML=''}
function findStore(id){return (dash.barbearias||[]).find(b=>String(b.id)===String(id))}
function findOwner(id){return (dash.donos||[]).find(d=>String(d.user_id)===String(id))}
function openStoreModal(id){const b=findStore(id);if(!b)return;openModal('Editar barbearia',`<div class="formgrid"><div class="field"><label>Nome</label><input class="inp" id="editNome" value="${esc(b.nome)}"></div><div class="field"><label>Slug</label><input class="inp" id="editSlug" value="${esc(b.slug)}"></div><div class="field"><label>Status</label><select id="editStatus"><option value="ativa">ativa</option><option value="suspensa">suspensa</option></select></div><div class="field"><label>WhatsApp dono</label><input class="inp" id="editZap" inputmode="numeric" oninput="this.value=formatPhoneBR(this.value)" value="${esc(formatPhoneBR(b.whatsapp_dono||''))}"></div></div>`,`<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveStore('${esc(b.id)}')">Salvar</button>`);editStatus.value=b.status||'ativa'}
async function saveStore(id){await request('saas-barbearias',{method:'PATCH',body:JSON.stringify({nome:editNome.value,slug:editSlug.value,status:editStatus.value,whatsapp_dono:localPhoneDigits(editZap.value)})},{id});toast('Loja atualizada');closeModal();await load()}
function openOwnerModal(userId){const d=findOwner(userId);if(!d)return;openModal('Alterar dono',`<div class="formgrid one"><div class="field"><label>Nome</label><input class="inp" id="ownerNome" value="${esc(d.nome||'')}"></div><div class="field"><label>E-mail</label><input class="inp" id="ownerEmail" value="${esc(d.email||'')}"></div><div class="field"><label>Nova senha</label><div class="passWrap"><input class="inp" id="ownerPass" type="password" placeholder="deixe vazio para manter"><button class="eyeBtn" type="button" onclick="togglePassword('ownerPass',this)">👁</button></div></div><div class="previewBox">Loja vinculada: ${esc(d.barbearia_nome||'-')}</div></div>`,`<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveOwner('${esc(userId)}')">Salvar</button>`)}
async function saveOwner(userId){await request('saas-owners',{method:'PATCH',body:JSON.stringify({user_id:userId,nome:ownerNome.value,email:ownerEmail.value,password:ownerPass.value})});toast('Dono atualizado');closeModal();await load();if(current==='donos')renderDonos()}
async function setStatus(id,status){await request('saas-barbearias',{method:'PATCH',body:JSON.stringify({status})},{id});toast('Status atualizado');await load()}
function openDeleteStoreModal(id){
  const b=findStore(id);
  if(!b)return;
  openModal('Excluir barbearia',`<div class="previewBox"><b style="color:#fff">Atenção: esta ação apaga a barbearia ${esc(b.nome)}.</b><br>Também serão removidos agendamentos, clientes, serviços, barbeiros, horários e WhatsApp vinculados a ela.</div><div class="field" style="margin-top:12px"><label>Digite o slug para confirmar</label><input class="inp" id="deleteStoreSlug" autocomplete="off" placeholder="${esc(b.slug)}"></div><div class="err" id="deleteStoreErr"></div>`,`<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn danger" onclick="deleteStore('${esc(b.id)}','${esc(b.slug)}')">Excluir barbearia</button>`);
}
async function deleteStore(id,slug){
  const typed=(deleteStoreSlug.value||'').trim();
  if(typed!==slug){
    deleteStoreErr.textContent='Digite exatamente o slug da barbearia para confirmar.';
    deleteStoreErr.classList.add('show');
    return;
  }
  try{
    await request('saas-barbearias',{method:'DELETE'},{id});
    toast('Barbearia excluída');
    closeModal();
    await load();
    if(current==='lojas')renderLojas();
  }catch(e){
    deleteStoreErr.textContent=e.message||'Não foi possível excluir.';
    deleteStoreErr.classList.add('show');
  }
}
function copyText(text){navigator.clipboard?.writeText(text);toast('Link copiado')}

pass.addEventListener('keydown',e=>{if(e.key==='Enter')loginFn()});
init();
</script>
</body>
</html>
