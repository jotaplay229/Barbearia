<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dono do SaaS</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#080808;--s:#111;--s2:#181818;--s3:#222;--b:#282828;--t:#f2f2f2;--m:#8b8b8b;--d:#4c4c4c;--ok:#4ade80;--err:#f87171;--warn:#fbbf24}body{background:var(--bg);color:var(--t);font-family:Inter,Arial,sans-serif;font-size:13px}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.box{width:min(400px,100%);background:#111;border:1px solid var(--b);border-radius:24px;padding:26px}.mark{width:48px;height:48px;border-radius:16px;background:#fff;color:#000;display:grid;place-items:center;font-size:24px;margin-bottom:18px}.sub{color:var(--m);line-height:1.5;margin:8px 0 18px}.inp{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:11px 12px;color:#fff;margin-bottom:10px}.btn{border:1px solid var(--b);background:var(--s2);color:#fff;border-radius:12px;padding:10px 13px;cursor:pointer;font-weight:700}.btn.primary{background:#fff;color:#000;border-color:#fff}.app{display:none;min-height:100vh}.app.show{display:block}.top{height:62px;background:#111;border-bottom:1px solid #242424;display:flex;align-items:center;padding:0 22px;gap:12px;position:sticky;top:0}.brand{font-weight:900;flex:1}.content{padding:22px;max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.card{background:#111;border:1px solid #242424;border-radius:18px;padding:16px}.k{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}.v{font-size:26px;font-weight:900}.two{display:grid;grid-template-columns:1.4fr .6fr;gap:12px}.table{width:100%;border-collapse:collapse}.table th{font-size:10px;color:#555;text-transform:uppercase;text-align:left;border-bottom:1px solid #222;padding:8px}.table td{border-bottom:1px solid #222;padding:10px 8px}.pill{border-radius:999px;padding:4px 9px;background:#222;color:#aaa;font-size:11px}.pill.ok{background:#0d2215;color:var(--ok)}.pill.warn{background:#231a05;color:var(--warn)}.pill.err{background:#240d0d;color:var(--err)}@media(max-width:820px){.grid,.two{grid-template-columns:1fr}.content{padding:14px}.top{padding:0 14px}}
</style></head><body><div class="login" id="login"><div class="box"><div class="mark">S</div><h1>Dono do SaaS</h1><p class="sub">Acesso separado do dono da barbearia. O e-mail precisa estar em <b>SAAS_ADMIN_EMAILS</b> na Vercel.</p><input class="inp" id="email" type="email" placeholder="seuemail@gmail.com"><input class="inp" id="pass" type="password" placeholder="Senha"><button class="btn primary" style="width:100%" onclick="loginFn()">Entrar</button><p id="err" class="sub" style="color:var(--err)"></p></div></div><div class="app" id="app"><div class="top"><div class="brand">BarberOS · Super Admin</div><button class="btn" onclick="logout()">Sair</button></div><main class="content" id="content"></main></div><script>
let sb,token,dash;
async function init(){const cfg=await fetch('/api/config').then(r=>r.json());sb=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);const {data}=await sb.auth.getSession();if(data.session){token=data.session.access_token;await load()}}
function api(p,o={}){return fetch(p,{...o,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,...(o.headers||{})}}).then(async r=>{const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.erro||'Erro');return j})}
async function loginFn(){err.textContent='';const {data,error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});if(error){err.textContent=error.message;return}token=data.session.access_token;await load()}
async function logout(){await sb.auth.signOut();location.reload()}
async function load(){try{dash=await api('/api/saas-dashboard');login.style.display='none';app.classList.add('show');render()}catch(e){err.textContent=e.message}}
function render(){content.innerHTML=`<div class="grid"><div class="card"><div class="k">Barbearias</div><div class="v">${dash.total_barbearias}</div></div><div class="card"><div class="k">Ativas</div><div class="v">${dash.ativas}</div></div><div class="card"><div class="k">Suspensas</div><div class="v">${dash.suspensas}</div></div><div class="card"><div class="k">Agendamentos</div><div class="v">${dash.agendamentos_total}</div></div></div><div class="two"><div class="card"><h3>Barbearias cadastradas</h3><table class="table"><thead><tr><th>Nome</th><th>Slug</th><th>Plano</th><th>Status</th><th></th></tr></thead><tbody>${dash.barbearias.map(b=>`<tr><td>${b.nome}</td><td>/agendar?slug=${b.slug}</td><td>${b.plano}</td><td><span class="pill ${b.status==='ativa'?'ok':b.status==='trial'?'warn':'err'}">${b.status}</span></td><td><button class="btn" onclick="setStatus('${b.id}','${b.status==='ativa'?'suspensa':'ativa'}')">${b.status==='ativa'?'Suspender':'Ativar'}</button></td></tr>`).join('')}</tbody></table></div><div class="card"><h3>Nova barbearia</h3><p class="sub">Primeiro crie o usuário do dono no Supabase Auth e copie o ID dele.</p><input class="inp" id="nome" placeholder="Nome da barbearia"><input class="inp" id="owner" placeholder="owner_user_id"><input class="inp" id="zap" placeholder="WhatsApp do dono"><button class="btn primary" onclick="createBarb()">Criar</button><pre id="res" style="white-space:pre-wrap;color:#888;margin-top:12px"></pre></div></div>`}
async function createBarb(){const j=await api('/api/saas-barbearias',{method:'POST',body:JSON.stringify({nome:nome.value,owner_user_id:owner.value,whatsapp_dono:zap.value,plano:'pro',status:'ativa'})});res.textContent=JSON.stringify(j,null,2);dash=await api('/api/saas-dashboard');render()}
async function setStatus(id,status){await api('/api/saas-barbearias?id='+id,{method:'PATCH',body:JSON.stringify({status})});dash=await api('/api/saas-dashboard');render()}
init();</script></body></html>
