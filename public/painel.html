<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel da Barbearia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#080808;--s:#111;--s2:#181818;--s3:#222;--b:#282828;--t:#f3f3f3;--m:#888;--d:#4a4a4a;--ok:#4ade80;--err:#f87171;--warn:#fbbf24;--r:14px}body{background:var(--bg);color:var(--t);font-family:Inter,Arial,sans-serif;font-size:13px}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.box{width:min(390px,100%);background:#111;border:1px solid var(--b);border-radius:24px;padding:26px;box-shadow:0 20px 70px #000}.mark{width:48px;height:48px;border-radius:16px;background:#fff;color:#000;display:grid;place-items:center;font-size:24px;margin-bottom:18px}h1{font-size:22px;margin-bottom:6px}.sub{color:var(--m);line-height:1.5;margin-bottom:20px}.field{margin-bottom:12px}.field label{display:block;color:var(--m);font-size:12px;margin-bottom:6px}.inp,select,textarea{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:11px 12px;color:var(--t);outline:none}.inp:focus,textarea:focus{border-color:#555}.btn{border:1px solid var(--b);background:var(--s2);color:var(--t);border-radius:12px;padding:10px 13px;cursor:pointer;transition:.15s;font-weight:600}.btn:hover{transform:translateY(-1px);border-color:#555}.btn.primary{background:#fff;color:#000;border-color:#fff}.app{display:none;min-height:100vh}.app.show{display:grid;grid-template-columns:240px 1fr}.side{background:var(--s);border-right:1px solid var(--b);padding:16px;position:sticky;top:0;height:100vh}.brand{display:flex;gap:10px;align-items:center;margin-bottom:18px}.brand-logo{width:42px;height:42px;border-radius:14px;background:var(--s3);border:1px solid var(--b);display:grid;place-items:center;overflow:hidden}.brand-logo img{width:100%;height:100%;object-fit:cover}.nav{display:grid;gap:5px}.nav button{text-align:left;background:transparent;color:var(--m);border:0;padding:11px;border-radius:12px;cursor:pointer}.nav button.active,.nav button:hover{background:var(--s2);color:#fff}.online{margin-top:18px;border:1px solid var(--b);border-radius:14px;padding:12px;background:var(--s2);color:var(--m);display:flex;justify-content:space-between}.dot{width:9px;height:9px;background:var(--ok);border-radius:50%;display:inline-block;margin-right:6px}.main{min-width:0}.top{height:58px;border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 20px;background:var(--s);position:sticky;top:0;z-index:10}.top h2{font-size:15px;flex:1}.content{padding:20px;max-width:1180px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.card{background:var(--s);border:1px solid var(--b);border-radius:18px;padding:16px}.k{color:var(--m);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}.v{font-size:24px;font-weight:700}.two{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}.row{display:flex;gap:10px;align-items:center;border-bottom:1px solid #222;padding:10px 0}.row:last-child{border-bottom:0}.row>div{flex:1}.pill{border-radius:999px;padding:4px 9px;font-size:11px;background:#222;color:#aaa}.pill.ok{background:#0d2215;color:var(--ok)}.pill.warn{background:#231a05;color:var(--warn)}.table{width:100%;border-collapse:collapse}.table th{color:var(--d);font-size:10px;text-align:left;text-transform:uppercase;padding:8px;border-bottom:1px solid #222}.table td{padding:10px 8px;border-bottom:1px solid #222}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{border:1px solid #222;border-radius:14px;padding:10px;background:#101010}.day b{display:block;margin-bottom:8px}.toast{position:fixed;right:18px;bottom:18px;background:#0d2215;color:var(--ok);border:1px solid var(--ok);border-radius:14px;padding:12px 14px;opacity:0;transition:.25s}.toast.show{opacity:1}.hide{display:none!important}@media(max-width:900px){.app.show{display:block}.side{height:auto;position:relative}.grid,.two,.formgrid,.days{grid-template-columns:1fr}.content{padding:14px}.top{top:0}.nav{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<div class="login" id="login"><div class="box"><div class="mark">✂</div><h1>Painel do dono</h1><div class="sub">Entre com o usuário do dono da barbearia. Cada dono configura o próprio WhatsApp Evolution.</div><div class="field"><label>E-mail</label><input id="email" class="inp" type="email" placeholder="dono@barbearia.com"></div><div class="field"><label>Senha</label><input id="pass" class="inp" type="password" placeholder="••••••••"></div><button class="btn primary" style="width:100%" onclick="login()">Entrar</button><p id="loginErr" class="sub" style="color:var(--err);margin-top:12px"></p></div></div>
<div class="app" id="app"><aside class="side"><div class="brand"><div class="brand-logo" id="logoBox">✂</div><div><b id="brandName">Barbearia</b><div style="color:var(--d);font-size:11px">Painel da loja</div></div></div><div class="nav"><button class="active" data-page="dash" onclick="page('dash')">Dashboard</button><button data-page="agenda" onclick="page('agenda')">Agenda</button><button data-page="servicos" onclick="page('servicos')">Serviços</button><button data-page="barbeiros" onclick="page('barbeiros')">Barbeiros</button><button data-page="config" onclick="page('config')">Configurações</button><button data-page="whatsapp" onclick="page('whatsapp')">WhatsApp</button></div><div class="online"><span><i class="dot"></i>Loja ativa</span></div></aside><main class="main"><div class="top"><h2 id="title">Dashboard</h2><button class="btn" onclick="logout()">Sair</button></div><div class="content" id="content"></div></main></div><div class="toast" id="toast">Salvo!</div>
<script>
let sb, session, token, me, barbearia, current='dash', cache={servicos:[],barbeiros:[],agenda:[]};
async function init(){const cfg=await fetch('/api/config').then(r=>r.json());sb=supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);const {data}=await sb.auth.getSession();if(data.session){session=data.session;token=session.access_token;await loadMe();}}
function api(path,opt={}){return fetch(path,{...opt,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,...(opt.headers||{})}}).then(async r=>{const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.erro||'Erro');return j})}
async function login(){loginErr.textContent='';const {data,error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});if(error){loginErr.textContent=error.message;return}session=data.session;token=session.access_token;await loadMe()}
async function logout(){await sb.auth.signOut();location.reload()}
async function loadMe(){const j=await api('/api/owner-me');me=j.user;barbearia=j.barbearia;login.style.display='none';app.classList.add('show');brandName.textContent=barbearia.nome;if(barbearia.logo_url)logoBox.innerHTML=`<img src="${barbearia.logo_url}">`;render()}
function page(p){current=p;document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));title.textContent={dash:'Dashboard',agenda:'Agenda',servicos:'Serviços',barbeiros:'Barbeiros',config:'Configurações',whatsapp:'WhatsApp próprio'}[p];render()}
function money(c){return (c/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function toast(msg='Salvo com sucesso!'){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
async function render(){if(current==='dash')return renderDash();if(current==='agenda')return renderAgenda();if(current==='servicos')return renderServicos();if(current==='barbeiros')return renderBarbeiros();if(current==='config')return renderConfig();if(current==='whatsapp')return renderWhatsapp();}
async function renderDash(){const today=new Date().toISOString().slice(0,10);const a=await api('/api/owner-agenda?data='+today);cache.agenda=a.agendamentos;content.innerHTML=`<div class="grid"><div class="card"><div class="k">Agendamentos hoje</div><div class="v">${a.agendamentos.length}</div></div><div class="card"><div class="k">Pendentes</div><div class="v">${a.agendamentos.filter(x=>x.status==='pendente').length}</div></div><div class="card"><div class="k">Confirmados</div><div class="v">${a.agendamentos.filter(x=>x.status==='confirmado').length}</div></div><div class="card"><div class="k">Link público</div><div style="word-break:break-all;color:#aaa">/agendar?slug=${barbearia.slug}</div></div></div><div class="card"><h3>Próximos horários</h3>${tableAgenda(a.agendamentos)}</div>`}
function tableAgenda(arr){return `<table class="table"><thead><tr><th>Hora</th><th>Cliente</th><th>Serviço</th><th>Status</th><th></th></tr></thead><tbody>${arr.map(a=>`<tr><td>${String(a.hora_inicio).slice(0,5)}</td><td>${a.cliente_nome}<br><small style="color:#777">${a.cliente_whatsapp}</small></td><td>${a.servicos?.nome||'-'}</td><td><span class="pill ${a.status==='confirmado'?'ok':'warn'}">${a.status}</span></td><td><button class="btn" onclick="setStatus('${a.id}','confirmado')">Confirmar</button></td></tr>`).join('')||'<tr><td colspan="5" style="color:#777">Nenhum agendamento.</td></tr>'}</tbody></table>`}
async function setStatus(id,status){await api('/api/owner-agenda?id='+id,{method:'PATCH',body:JSON.stringify({status})});toast('Status atualizado e cliente avisado se WhatsApp estiver ativo.');renderAgenda()}
async function renderAgenda(){const d=new Date().toISOString().slice(0,10);content.innerHTML=`<div class="card"><div class="row"><div><b>Agenda do dia</b><br><small style="color:#777">Confirme para disparar mensagem ao cliente.</small></div><input class="inp" type="date" id="agendaDate" value="${d}" onchange="loadAgendaDate()"></div><div id="agendaTable"></div></div>`;loadAgendaDate()}
async function loadAgendaDate(){const d=document.getElementById('agendaDate').value;const a=await api('/api/owner-agenda?data='+d);document.getElementById('agendaTable').innerHTML=tableAgenda(a.agendamentos)}
async function renderServicos(){const j=await api('/api/owner-servicos');cache.servicos=j.servicos;content.innerHTML=`<div class="two"><div class="card"><h3>Serviços</h3>${j.servicos.map(s=>`<div class="row"><div><b>${s.nome}</b><br><small style="color:#777">${s.duracao_minutos} min · ${money(s.preco_cents)}</small></div><span class="pill ${s.ativo?'ok':''}">${s.ativo?'Ativo':'Inativo'}</span></div>`).join('')}</div><div class="card"><h3>Novo serviço</h3><div class="field"><label>Nome</label><input class="inp" id="sn"></div><div class="field"><label>Preço em centavos</label><input class="inp" id="sp" value="3500"></div><div class="field"><label>Duração</label><input class="inp" id="sd" value="30"></div><button class="btn primary" onclick="addServico()">Adicionar</button></div></div>`}
async function addServico(){await api('/api/owner-servicos',{method:'POST',body:JSON.stringify({nome:sn.value,preco_cents:sp.value,duracao_minutos:sd.value})});toast();renderServicos()}
async function renderBarbeiros(){const j=await api('/api/owner-barbeiros');content.innerHTML=`<div class="two"><div class="card"><h3>Barbeiros</h3>${j.barbeiros.map(b=>`<div class="row"><div><b>${b.nome}</b><br><small style="color:#777">${b.ativo?'Ativo':'Inativo'}</small></div><span class="pill ok">${b.ativo?'Ativo':'Inativo'}</span></div>`).join('')}</div><div class="card"><h3>Novo barbeiro</h3><div class="field"><label>Nome</label><input class="inp" id="bn"></div><button class="btn primary" onclick="addBarbeiro()">Adicionar</button></div></div>`}
async function addBarbeiro(){await api('/api/owner-barbeiros',{method:'POST',body:JSON.stringify({nome:bn.value})});toast();renderBarbeiros()}
async function renderConfig(){const j=await api('/api/owner-settings');barbearia=j.barbearia;const hs=j.horarios.length?j.horarios:[0,1,2,3,4,5,6].map(d=>({dia_semana:d,ativo:d!==0,abre:'08:00',fecha:'18:00'}));content.innerHTML=`<div class="card"><h3>Dados da barbearia</h3><div class="formgrid"><div class="field"><label>Nome</label><input class="inp" id="nome" value="${barbearia.nome||''}"></div><div class="field"><label>Slug/link</label><input class="inp" id="slug" value="${barbearia.slug||''}"></div><div class="field"><label>Logo URL</label><input class="inp" id="logo_url" value="${barbearia.logo_url||''}"></div><div class="field"><label>WhatsApp do dono</label><input class="inp" id="whatsapp_dono" value="${barbearia.whatsapp_dono||''}"></div><div class="field"><label>Endereço</label><input class="inp" id="endereco" value="${barbearia.endereco||''}"></div><div class="field"><label>Intervalo em minutos</label><input class="inp" id="intervalo" value="${barbearia.intervalo_minutos||30}"></div></div><div class="field"><label>Descrição</label><textarea id="descricao" rows="3">${barbearia.descricao||''}</textarea></div><h3 style="margin:16px 0 10px">Horários</h3><div class="days">${hs.map(h=>`<div class="day"><b>${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][h.dia_semana]}</b><label><input type="checkbox" class="hativo" data-d="${h.dia_semana}" ${h.ativo?'checked':''}> aberto</label><input class="inp habre" data-d="${h.dia_semana}" value="${String(h.abre).slice(0,5)}" style="margin:8px 0"><input class="inp hfecha" data-d="${h.dia_semana}" value="${String(h.fecha).slice(0,5)}"></div>`).join('')}</div><br><button class="btn primary" onclick="saveConfig()">Salvar configurações</button></div>`}
async function saveConfig(){const horarios=[...document.querySelectorAll('.hativo')].map(ch=>{const d=ch.dataset.d;return{dia_semana:Number(d),ativo:ch.checked,abre:document.querySelector('.habre[data-d="'+d+'"]').value,fecha:document.querySelector('.hfecha[data-d="'+d+'"]').value}});await api('/api/owner-settings',{method:'PUT',body:JSON.stringify({nome:nome.value,slug:slug.value,logo_url:logo_url.value,whatsapp_dono:whatsapp_dono.value,endereco:endereco.value,descricao:descricao.value,intervalo_minutos:intervalo.value,horarios})});toast();await loadMe()}
async function renderWhatsapp(){const j=await api('/api/owner-whatsapp');const w=j.whatsapp||{};content.innerHTML=`<div class="card"><h3>WhatsApp próprio da barbearia</h3><p style="color:#888;margin:8px 0 16px">Aqui o dono coloca os dados da própria instância Evolution. Cada barbearia envia mensagem pelo próprio número.</p><div class="formgrid"><div class="field"><label>Evolution API URL</label><input class="inp" id="eurl" placeholder="https://evolution.seudominio.com" value="${w.evolution_api_url||''}"></div><div class="field"><label>Instance name</label><input class="inp" id="inst" placeholder="barbearia-do-rei" value="${w.instance_name||''}"></div><div class="field"><label>API Key da Evolution</label><input class="inp" id="ekey" placeholder="cole a api key" value="${w.evolution_api_key||''}"></div><div class="field"><label>Número para teste</label><input class="inp" id="testnum" placeholder="5584999999999"></div></div><button class="btn primary" onclick="saveWhats()">Salvar WhatsApp</button> <button class="btn" onclick="testWhats()">Enviar teste</button> <button class="btn" onclick="statusWhats()">Ver status</button><pre id="wres" style="white-space:pre-wrap;color:#aaa;margin-top:14px;background:#090909;border:1px solid #222;border-radius:12px;padding:12px"></pre></div>`}
async function saveWhats(){const j=await api('/api/owner-whatsapp',{method:'PUT',body:JSON.stringify({evolution_api_url:eurl.value,instance_name:inst.value,evolution_api_key:ekey.value,ativo:true})});toast('WhatsApp salvo');wres.textContent=JSON.stringify(j,null,2)}
async function testWhats(){const j=await api('/api/owner-whatsapp',{method:'POST',body:JSON.stringify({action:'test',number:testnum.value})});wres.textContent=JSON.stringify(j,null,2)}
async function statusWhats(){const j=await api('/api/owner-whatsapp',{method:'POST',body:JSON.stringify({action:'status'})});wres.textContent=JSON.stringify(j,null,2)}
init();
</script></body></html>
