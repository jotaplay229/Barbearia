<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Agendamento</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#070707;color:#f4f4f4;font-family:Inter,Arial,sans-serif;min-height:100vh}.phone{max-width:520px;margin:0 auto;min-height:100vh;background:radial-gradient(circle at top,#1b1b1b,#080808 55%);padding:18px 14px 110px}.hero{animation:rise .45s ease both;border:1px solid #242424;background:linear-gradient(180deg,#151515,#0d0d0d);border-radius:28px;padding:20px;margin-bottom:14px;box-shadow:0 20px 60px rgba(0,0,0,.45)}@keyframes rise{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}.top{display:flex;gap:12px;align-items:center}.logo{width:60px;height:60px;border-radius:22px;background:#fff;color:#000;display:grid;place-items:center;font-size:27px;overflow:hidden;flex-shrink:0}.logo img{width:100%;height:100%;object-fit:cover}.hero h1{font-size:23px;line-height:1.1}.muted{color:#9a9a9a;font-size:13px;line-height:1.5}.steps{display:flex;gap:6px;margin:18px 0 2px}.step{height:4px;background:#2a2a2a;border-radius:10px;flex:1}.step.on{background:#fff}.sec{animation:rise .35s ease both;border:1px solid #242424;background:#101010;border-radius:24px;padding:16px;margin-bottom:12px}.sec h2{font-size:16px;margin-bottom:12px}.grid{display:grid;gap:9px}.item{border:1px solid #272727;background:#151515;border-radius:18px;padding:14px;display:flex;gap:10px;align-items:center;cursor:pointer;transition:.15s}.item:active{transform:scale(.985)}.item.selected{border-color:#fff;background:#222}.item .icon{width:42px;height:42px;border-radius:15px;background:#fff;color:#000;display:grid;place-items:center;font-weight:900}.item b{display:block}.item small{color:#858585}.price{margin-left:auto;font-weight:800}.chips{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.chip{border:1px solid #272727;background:#151515;color:#f4f4f4;border-radius:999px;padding:11px 14px;white-space:nowrap;cursor:pointer}.chip.selected{background:#fff;color:#000;border-color:#fff}.times{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.time{border:1px solid #272727;background:#151515;border-radius:16px;padding:13px 0;text-align:center;cursor:pointer;font-weight:800}.time.selected{background:#fff;color:#000}.field{margin-bottom:10px}.field label{display:block;color:#8d8d8d;font-size:12px;margin-bottom:6px}.inp,textarea{width:100%;background:#151515;border:1px solid #2a2a2a;color:#fff;border-radius:16px;padding:14px;outline:none;font-size:16px}.inp:focus{border-color:#fff}.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(8,8,8,.88);backdrop-filter:blur(16px);border-top:1px solid #242424;padding:12px 14px calc(12px + env(safe-area-inset-bottom));z-index:10}.bottom-inner{max-width:520px;margin:auto;display:flex;align-items:center;gap:12px}.summary{flex:1;min-width:0}.summary b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.summary span{color:#888;font-size:12px}.btn{border:0;background:#fff;color:#000;border-radius:18px;padding:14px 18px;font-weight:900;cursor:pointer;min-width:130px}.btn:disabled{opacity:.4}.hide{display:none}.loader{width:20px;height:20px;border:2px solid #555;border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:auto}@keyframes spin{to{transform:rotate(360deg)}}.success{text-align:center;padding:28px 12px}.success .ok{width:78px;height:78px;border-radius:28px;background:#0d2215;color:#4ade80;display:grid;place-items:center;font-size:38px;margin:0 auto 15px}@media(max-width:360px){.times{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:20px}.btn{min-width:110px}}
</style></head><body><main class="phone"><section class="hero"><div class="top"><div class="logo" id="logo">✂</div><div><h1 id="nome">Carregando...</h1><p class="muted" id="desc">Buscando informações da barbearia</p></div></div><div class="steps"><i class="step on" id="st1"></i><i class="step" id="st2"></i><i class="step" id="st3"></i><i class="step" id="st4"></i></div></section><div id="app"><section class="sec"><div class="loader"></div></section></div></main><footer class="bottom"><div class="bottom-inner"><div class="summary"><b id="sum1">Escolha seu horário</b><span id="sum2">Serviço, profissional, data e hora</span></div><button class="btn" id="next" onclick="nextStep()" disabled>Continuar</button></div></footer>
<script>
const qs=new URLSearchParams(location.search);let slug=qs.get('slug')||location.pathname.split('/').filter(Boolean).pop()||'barbearia-do-rei';let data={servicos:[],barbeiros:[],horarios:[],barbearia:null};let step=1,sel={servico:null,barbeiro:null,data:null,hora:null};
function money(c){return (c/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function todayPlus(i){const d=new Date();d.setDate(d.getDate()+i);return d.toISOString().slice(0,10)}function br(d){const [y,m,dd]=d.split('-');return `${dd}/${m}`}
async function load(){try{const j=await fetch('/api/public-barbearia?slug='+encodeURIComponent(slug)).then(r=>r.json());if(j.erro)throw new Error(j.erro);data=j;nome.textContent=j.barbearia.nome;desc.textContent=j.barbearia.descricao||j.barbearia.endereco||'Agende seu horário em poucos toques';if(j.barbearia.logo_url)logo.innerHTML=`<img src="${j.barbearia.logo_url}">`;render()}catch(e){app.innerHTML=`<section class="sec"><h2>Ops...</h2><p class="muted">${e.message}</p></section>`;next.disabled=true}}
function setSteps(){[st1,st2,st3,st4].forEach((el,i)=>el.classList.toggle('on',i<step));next.textContent=step===4?'Confirmar':'Continuar';next.disabled=(step===1&&!sel.servico)||(step===2&&!sel.barbeiro)||(step===3&&(!sel.data||!sel.hora))}
function render(){setSteps();if(step===1)renderServicos();if(step===2)renderBarbeiros();if(step===3)renderDataHora();if(step===4)renderCliente();summary()}
function summary(){sum1.textContent=sel.servico?sel.servico.nome:'Escolha seu horário';sum2.textContent=[sel.barbeiro?.nome,sel.data?br(sel.data):null,sel.hora].filter(Boolean).join(' · ')||'Serviço, profissional, data e hora'}
function renderServicos(){app.innerHTML=`<section class="sec"><h2>Escolha o serviço</h2><div class="grid">${data.servicos.map(s=>`<div class="item ${sel.servico?.id===s.id?'selected':''}" onclick="pickServico('${s.id}')"><div class="icon">✂</div><div><b>${s.nome}</b><small>${s.duracao_minutos} min</small></div><div class="price">${money(s.preco_cents)}</div></div>`).join('')}</div></section>`}
function pickServico(id){sel.servico=data.servicos.find(s=>s.id===id);sel.hora=null;render()}
function renderBarbeiros(){const all=[...data.barbeiros];app.innerHTML=`<section class="sec"><h2>Escolha o profissional</h2><div class="grid">${all.map(b=>`<div class="item ${sel.barbeiro?.id===b.id?'selected':''}" onclick="pickBarbeiro('${b.id}')"><div class="icon">${b.nome.split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div><b>${b.nome}</b><small>Disponível para agendamento</small></div></div>`).join('')}</div></section>`}
function pickBarbeiro(id){sel.barbeiro=data.barbeiros.find(b=>b.id===id);sel.hora=null;render()}
async function renderDataHora(){if(!sel.data)sel.data=todayPlus(0);app.innerHTML=`<section class="sec"><h2>Escolha o dia</h2><div class="chips">${[0,1,2,3,4,5,6].map(i=>{const d=todayPlus(i);return`<button class="chip ${sel.data===d?'selected':''}" onclick="pickData('${d}')">${i===0?'Hoje':i===1?'Amanhã':br(d)}</button>`}).join('')}</div></section><section class="sec"><h2>Horários disponíveis</h2><div id="times"><div class="loader"></div></div></section>`;setSteps();loadTimes()}
async function pickData(d){sel.data=d;sel.hora=null;renderDataHora()}
async function loadTimes(){const url=`/api/horarios-disponiveis?slug=${encodeURIComponent(slug)}&data=${sel.data}&servico_id=${sel.servico.id}&barbeiro_id=${sel.barbeiro.id}`;const j=await fetch(url).then(r=>r.json());const arr=j.horarios||[];times.innerHTML=arr.length?`<div class="times">${arr.map(h=>`<button class="time ${sel.hora===h?'selected':''}" onclick="pickHora('${h}')">${h}</button>`).join('')}</div>`:'<p class="muted">Nenhum horário livre nesse dia.</p>'}
function pickHora(h){sel.hora=h;document.querySelectorAll('.time').forEach(x=>x.classList.toggle('selected',x.textContent===h));setSteps();summary()}
function renderCliente(){app.innerHTML=`<section class="sec"><h2>Seus dados</h2><div class="field"><label>Nome</label><input class="inp" id="clienteNome" autocomplete="name" placeholder="Seu nome completo"></div><div class="field"><label>WhatsApp</label><input class="inp" id="clienteWhats" inputmode="tel" placeholder="(84) 99999-9999"></div><div class="field"><label>Observação opcional</label><textarea id="obs" rows="3" placeholder="Ex: quero degradê baixo"></textarea></div></section><section class="sec"><h2>Resumo</h2><p class="muted">${sel.servico.nome} com ${sel.barbeiro.nome}<br>${br(sel.data)} às ${sel.hora}<br>${money(sel.servico.preco_cents)}</p></section>`;next.disabled=false;summary()}
function nextStep(){if(step<4){step++;render();return}confirmar()}
async function confirmar(){const nome=document.getElementById('clienteNome')?.value.trim();const whats=document.getElementById('clienteWhats')?.value.trim();if(!nome||!whats){alert('Preencha nome e WhatsApp.');return}next.disabled=true;next.textContent='Enviando...';try{const resp=await fetch('/api/agendamentos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug,cliente_nome:nome,cliente_whatsapp:whats,servico_id:sel.servico.id,barbeiro_id:sel.barbeiro.id,data_agendamento:sel.data,hora_inicio:sel.hora,observacoes:document.getElementById('obs').value})});const j=await resp.json();if(!resp.ok)throw new Error(j.erro||'Erro ao agendar');document.querySelector('.bottom').classList.add('hide');app.innerHTML=`<section class="sec success"><div class="ok">✓</div><h2>Agendamento solicitado!</h2><p class="muted">Enviamos a confirmação no seu WhatsApp. A barbearia também foi avisada.</p></section>`}catch(e){alert(e.message);next.disabled=false;next.textContent='Confirmar'}}
load();
</script></body></html>
